<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JB PerformanceHub</title>
  <link rel="stylesheet" href="core/theme/tokens.css">
  <link rel="stylesheet" href="core/ui/ui.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-module="hub">
  <main class="hubShell">
    <header class="hubHeader">
      <div>
        <p class="eyebrow">JB Performance</p>
        <h1>PerformanceHub</h1>
      </div>
      <div class="hubStatus">Local workspace</div>
    </header>

    <section class="moduleGrid" aria-label="PerformanceHub modules">
      <a class="moduleTile forceplates" href="modules/forceplates/index.html">
        <span class="moduleIcon">FP</span>
        <span>
          <strong>ForcePlates</strong>
          <small>Measure, realtime, analyze, results</small>
        </span>
      </a>
      <a class="moduleTile timinggates" href="modules/timinggates/index.html">
        <span class="moduleIcon">TG</span>
        <span>
          <strong>TimingGates</strong>
          <small>Sprints, splits, gates</small>
        </span>
      </a>
      <a class="moduleTile reactionpucks" href="modules/reactionpucks/index.html">
        <span class="moduleIcon">RP</span>
        <span>
          <strong>Reaction Pucks</strong>
          <small>Reaction and agility tests</small>
        </span>
      </a>
      <a class="moduleTile athletes" href="modules/athletes/index.html">
        <span class="moduleIcon">AT</span>
        <span>
          <strong>Athletes</strong>
          <small>Roster, groups, librarian sync</small>
        </span>
      </a>
      <a class="moduleTile lab" href="modules/lab/index.html">
        <span class="moduleIcon">LB</span>
        <span>
          <strong>Lab</strong>
          <small>Experiments and diagnostics</small>
        </span>
      </a>
      <a class="moduleTile settings" href="modules/settings/index.html">
        <span class="moduleIcon">ST</span>
        <span>
          <strong>Settings</strong>
          <small>Devices, paths, defaults</small>
        </span>
      </a>
    </section>
  </main>
  <script src="core/ui/dialog.js"></script>
  <script src="app.js"></script>
</body>
</html>
